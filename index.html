<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicolas · Hub</title>
<!-- icône écran d'accueil -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f7f4ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nicolas">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ee; --card:#fffdf9; --ink:#2b2722; --line:#ece5d8;
  --c-nicolas:#4f46e5; --c-sdisvj:#e11d48; --c-sevj:#0284c7; --c-commande:#059669;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  min-height:100vh;background:var(--bg);color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}

/* ============================ GATE MOT DE PASSE ============================ */
#gate{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:grid;place-items:center;padding:24px;transition:opacity .5s ease;
}
#gate.hidden{opacity:0;pointer-events:none}
.lockbox{width:100%;max-width:380px;text-align:center}
.lock-ic{
  width:58px;height:58px;margin:0 auto 22px;border-radius:18px;
  display:grid;place-items:center;background:var(--card);border:1px solid var(--line);
  box-shadow:0 10px 30px -18px rgba(80,60,30,.6);
}
.lockbox h2{font-family:'Fraunces';font-weight:600;font-size:28px;margin-bottom:6px}
.lockbox p{font-size:14px;opacity:.55;margin-bottom:24px}
.pwd-row{display:flex;gap:8px}
#pwd{
  flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;
  padding:14px 16px;font-family:inherit;font-size:15px;color:var(--ink);outline:none;
  transition:border-color .2s;
}
#pwd:focus{border-color:var(--ink)}
#unlock{
  background:var(--ink);color:var(--bg);border:none;border-radius:13px;
  padding:0 20px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;transition:.2s;
}
#unlock:hover{opacity:.85}
#pwd-err{height:18px;margin-top:12px;font-size:13px;color:var(--c-sdisvj);opacity:0;transition:.2s}
#pwd-err.show{opacity:1}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ============================ CONTENU ============================ */
#app{opacity:0;transition:opacity .6s ease}
#app.ready{opacity:1}
.wrap{max-width:920px;margin:0 auto;padding:0 28px 120px}

header{padding:64px 0 8px}
.eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;opacity:.45}
h1{font-family:'Fraunces';font-weight:800;font-size:clamp(46px,9vw,80px);line-height:.9;letter-spacing:-.02em;margin-top:8px}
.tagline{margin-top:14px;font-size:16px;opacity:.6;max-width:42ch}

.search{
  display:flex;align-items:center;gap:10px;margin:34px 0;padding:14px 17px;border-radius:14px;
  background:var(--card);border:1px solid #e8e1d4;box-shadow:0 6px 20px -14px rgba(80,60,30,.5);
}
.search svg{flex-shrink:0;opacity:.4}
#search{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:15px;color:inherit}
.count{font-size:13px;opacity:.45;white-space:nowrap}

.category{margin-top:46px;animation:rise .5s both}
.cat-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.cat-head::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent)}
.cat-name{font-family:'Fraunces';font-weight:600;font-size:24px;letter-spacing:-.01em}
.cat-count{font-size:13px;opacity:.4;margin-left:auto;font-variant-numeric:tabular-nums}

.links{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{
  display:flex;align-items:center;gap:16px;cursor:pointer;
  background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;
  box-shadow:0 8px 26px -20px rgba(80,60,30,.6);
  transition:.3s cubic-bezier(.2,.8,.2,1);
}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 36px -22px rgba(80,60,30,.7);border-color:var(--accent)}
.logo{
  flex-shrink:0;width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
  font-family:'Fraunces';font-weight:800;font-size:17px;letter-spacing:-.02em;
  background:color-mix(in srgb,var(--accent) 16%,#fff);color:var(--accent);
}
.meta{min-width:0;flex:1}
.t{font-family:'Fraunces';font-weight:600;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u{font-size:12.5px;opacity:.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arrow{flex-shrink:0;color:var(--accent);opacity:.55;transition:.3s}
.card:hover .arrow{opacity:1;transform:translate(3px,-3px)}

.empty{display:none;text-align:center;padding:90px 0;opacity:.4}
.empty.show{display:block}
footer{margin-top:90px;text-align:center;font-size:13px;opacity:.4}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

@media(max-width:560px){header{padding-top:44px}}
</style>
</head>
<body>

<!-- ============================ GATE ============================ -->
<div id="gate">
  <div class="lockbox">
    <div class="lock-ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2b2722" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Accès privé</h2>
    <p>Entre le mot de passe pour accéder au hub.</p>
    <div class="pwd-row">
      <input id="pwd" type="password" placeholder="Mot de passe" autocomplete="off" autofocus>
      <button id="unlock">Entrer</button>
    </div>
    <div id="pwd-err">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ============================ APP ============================ -->
<div id="app">
  <div class="wrap">
    <header>
      <span class="eyebrow">Hub personnel</span>
      <h1>Nicolas</h1>
      <p class="tagline">Tous mes projets GitHub Pages, réunis au même endroit.</p>
    </header>

    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Rechercher un projet…" autocomplete="off">
      <span class="count" id="count"></span>
    </div>

    <main id="board"></main>
    <div class="empty" id="empty">Aucun résultat.</div>

    <footer>Conçu pour grandir avec tes projets · 2026</footer>
  </div>
</div>

<script>
/* ===================================================================== */
/*  ►► TES LIENS  ◄◄  — ajoute simplement des lignes { title, url }       */
/* ===================================================================== */
const DATA = [
  { name:"Nicolas",  color:"var(--c-nicolas)",  links:[
    { title:"R-Vision", url:"https://nicolas9696-admin.github.io/R-vision/" },
  ]},
  { name:"SDISVJ",   color:"var(--c-sdisvj)",   links:[
    { title:"Intervention SDISVJ", url:"https://nicolas9696-admin.github.io/Intervention_SDISVJ/" },
  ]},
  { name:"SEVJ",     color:"var(--c-sevj)",     links:[
    { title:"Formation OIBT", url:"https://nicolas9696-admin.github.io/SEVJ_FORMATION_OIBT/" },
    { title:"Comptoir SEVJ",  url:"https://nicolas9696-admin.github.io/SEVJ_Comptoir/" },
  ]},
  { name:"Commande", color:"var(--c-commande)", links:[
    { title:"Commande sur Grati", url:"https://nicolas9696-admin.github.io/commande_sur_grati/" },
  ]},
];
/* ===================================================================== */

/* ---------- rendu des liens ---------- */
const board=document.getElementById('board'),
      search=document.getElementById('search'),
      empty=document.getElementById('empty'),
      count=document.getElementById('count');

const initials=t=>{const w=t.replace(/[_-]/g,' ').split(' ').filter(Boolean);
  return (w.length>1?w[0][0]+w[1][0]:t.slice(0,2)).toUpperCase();};
const prettyUrl=u=>u.replace(/^https?:\/\//,'').replace(/\/$/,'');

function render(f=""){
  board.innerHTML="";f=f.trim().toLowerCase();let total=0;
  DATA.forEach(cat=>{
    const links=cat.links.filter(l=>
      l.title.toLowerCase().includes(f)||l.url.toLowerCase().includes(f)||cat.name.toLowerCase().includes(f));
    if(!links.length)return;total+=links.length;
    const s=document.createElement('section');
    s.className='category';s.style.setProperty('--accent',cat.color);
    s.innerHTML=`<div class="cat-head"><span class="cat-name">${cat.name}</span><span class="cat-count">${links.length}</span></div><div class="links"></div>`;
    const box=s.querySelector('.links');
    links.forEach(l=>{
      const a=document.createElement('a');
      a.className='card';a.href=l.url;a.target='_blank';a.rel='noopener';
      a.innerHTML=`<span class="logo">${initials(l.title)}</span>
        <span class="meta"><div class="t">${l.title}</div><div class="u">${prettyUrl(l.url)}</div></span>
        <span class="arrow"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg></span>`;
      box.appendChild(a);
    });
    board.appendChild(s);
  });
  empty.classList.toggle('show',total===0);
  count.textContent=total+(total>1?" liens":" lien");
}

/* ---------- easter egg : "swiss" ---------- */
const EGG_URL="https://www.youtube.com/watch?v=s7QJG-f9EYY&list=RDs7QJG-f9EYY&start_radio=1";
let eggFired=false;
search.addEventListener('input',e=>{
  const v=e.target.value.trim().toLowerCase();
  if(v==="swiss"&&!eggFired){
    eggFired=true;
    const w=window.open(EGG_URL,"_blank");
    if(!w) location.href=EGG_URL;      // repli si le pop-up est bloqué
    e.target.value="";
    setTimeout(()=>{eggFired=false;},1200);
    render("");return;
  }
  render(e.target.value);
});
render();

/* ---------- gate mot de passe (hash SHA-256, jamais en clair) ---------- */
const PWD_HASH="e0cc79a91131e2e31432e865b7d7d3f8122aef1d9d182d60dd177e47f265ccbb";

function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var mp=Math.pow,mw=mp(2,32),res='',words=[],bitLen=ascii.length*8;
  var hash=sha256.h=sha256.h||[],k=sha256.k=sha256.k||[],pc=k.length,comp={};
  for(var cand=2;pc<64;cand++){if(!comp[cand]){for(var i=0;i<313;i+=cand)comp[i]=cand;
    hash[pc]=(mp(cand,.5)*mw)|0;k[pc++]=(mp(cand,1/3)*mw)|0;}}
  ascii+='\x80';while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){var j=ascii.charCodeAt(i);if(j>>8)return;words[i>>2]|=j<<((3-i)%4)*8;}
  words[words.length]=((bitLen/mw)|0);words[words.length]=(bitLen);
  for(j=0;j<words.length;){var w=words.slice(j,j+=16),old=hash;hash=hash.slice(0,8);
    for(i=0;i<64;i++){var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=i<16?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]
          +(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;}
    for(i=0;i<8;i++)hash[i]=(hash[i]+old[i])|0;}
  for(i=0;i<8;i++)for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;res+=((b<16)?0:'')+b.toString(16);}
  return res;
}

const gate=document.getElementById('gate'),
      app=document.getElementById('app'),
      pwd=document.getElementById('pwd'),
      pwdErr=document.getElementById('pwd-err'),
      lockbox=document.querySelector('.lockbox');

function tryUnlock(){
  if(sha256(pwd.value)===PWD_HASH){
    gate.classList.add('hidden');
    app.classList.add('ready');
    setTimeout(()=>{gate.style.display='none';search.focus();},500);
  }else{
    pwdErr.classList.add('show');
    lockbox.classList.add('shake');
    pwd.value="";pwd.focus();
    setTimeout(()=>lockbox.classList.remove('shake'),400);
  }
}
document.getElementById('unlock').addEventListener('click',tryUnlock);
pwd.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
</script>
</body>
</html>
