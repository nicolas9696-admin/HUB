<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicolas · Hub</title>
<!-- icône écran d'accueil -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f7f4ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nicolas">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ee; --card:#fffdf9; --ink:#2b2722; --line:#ece5d8;
  --c-nicolas:#4f46e5; --c-sdisvj:#e11d48; --c-sevj:#0284c7; --c-commande:#059669; --c-gold:#c79a3a; --c-config:#64748b; --c-sdis972:#ea580c;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* ===== GATE ===== */
#gate{position:fixed;inset:0;z-index:100;background:var(--bg);display:grid;place-items:center;padding:24px;transition:opacity .5s ease}
#gate.hidden{opacity:0;pointer-events:none}
.lockbox{width:100%;max-width:380px;text-align:center}
.lock-ic{width:58px;height:58px;margin:0 auto 22px;border-radius:18px;display:grid;place-items:center;background:var(--card);border:1px solid var(--line);box-shadow:0 10px 30px -18px rgba(80,60,30,.6)}
.lockbox h2{font-family:'Fraunces';font-weight:600;font-size:28px;margin-bottom:6px}
.lockbox p{font-size:14px;opacity:.55;margin-bottom:24px}
.pwd-row{display:flex;gap:8px}
#pwd{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-family:inherit;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s}
#pwd:focus{border-color:var(--ink)}
#unlock{background:var(--ink);color:var(--bg);border:none;border-radius:13px;padding:0 20px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;transition:.2s}
#unlock:hover{opacity:.85}
#pwd-err{height:18px;margin-top:12px;font-size:13px;color:var(--c-sdisvj);opacity:0;transition:.2s}
#pwd-err.show{opacity:1}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ===== APP ===== */
#app{opacity:0;transition:opacity .6s ease}
#app.ready{opacity:1}
.wrap{max-width:920px;margin:0 auto;padding:0 28px 120px}

header{padding:60px 0 8px}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:14px}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;opacity:.5}
.status{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;opacity:.7}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:#9a9aa3}
.status.online  .status-dot{background:#16a34a;color:#16a34a;animation:blink 1.6s ease-in-out infinite}
.status.offline .status-dot{background:#e11d48;color:#e11d48;animation:blink .8s ease-in-out infinite}
.status.online  .status-txt{color:#16a34a}
.status.offline .status-txt{color:#e11d48}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor}50%{opacity:.25;box-shadow:0 0 7px 1px currentColor}}
h1{font-family:'Fraunces';font-weight:800;font-size:clamp(46px,9vw,80px);line-height:.9;letter-spacing:-.02em;margin-top:8px}
.tagline{margin-top:14px;font-size:16px;opacity:.6;max-width:42ch}

.search{display:flex;align-items:center;gap:10px;margin:34px 0 10px;padding:14px 17px;border-radius:14px;background:var(--card);border:1px solid #e8e1d4;box-shadow:0 6px 20px -14px rgba(80,60,30,.5)}
.search svg{flex-shrink:0;opacity:.4}
#search{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:15px;color:inherit}
.count{font-size:13px;opacity:.45;white-space:nowrap}
.kbd-hint{font-size:11px;opacity:.4;border:1px solid var(--line);border-radius:6px;padding:2px 7px;white-space:nowrap}

.checkbar{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-bottom:6px;font-size:12.5px;opacity:.75}
#lastcheck{font-variant-numeric:tabular-nums}
#recheck{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.2s}
#recheck:hover{border-color:var(--ink)}
#recheck svg{width:13px;height:13px}
#recheck.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.category{margin-top:42px;animation:rise .5s both}
.cat-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.cat-badge{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;background:color-mix(in srgb,var(--accent) 15%,#fff);color:var(--accent)}
.cat-badge svg{width:20px;height:20px}
.cat-name{font-family:'Fraunces';font-weight:600;font-size:24px;letter-spacing:-.01em}
.cat-tools{margin-left:auto;display:flex;align-items:center;gap:12px}
.cat-count{font-size:13px;opacity:.4;font-variant-numeric:tabular-nums}
.openall{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer;opacity:.7;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.openall:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.openall svg{width:13px;height:13px}

.links{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{display:flex;align-items:center;gap:14px;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 26px -20px rgba(80,60,30,.6);transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s,border-color .3s}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 36px -22px rgba(80,60,30,.7);border-color:var(--accent)}
.card.dragging{opacity:.4}
.card.kbd{box-shadow:0 0 0 2px var(--accent),0 18px 36px -22px rgba(80,60,30,.7)}
.logo{flex-shrink:0;width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-family:'Fraunces';font-weight:800;font-size:17px;letter-spacing:-.02em;background:color-mix(in srgb,var(--accent) 16%,#fff);color:var(--accent);position:relative}
.site-dot{position:absolute;bottom:-3px;right:-3px;width:14px;height:14px;border-radius:50%;border:2.5px solid var(--card);box-sizing:border-box;background:#c9c2b5}
.site-dot.up{background:#16a34a;color:#16a34a;animation:blink 1.8s ease-in-out infinite}
.site-dot.down{background:#e11d48;color:#e11d48;animation:blink .8s ease-in-out infinite}
.site-dot.checking{background:#d9a441;color:#d9a441;animation:blink 1s ease-in-out infinite}
.meta{min-width:0;flex:1}
.t{font-family:'Fraunces';font-weight:600;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u{font-size:12.5px;opacity:.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;align-items:center;gap:0;flex-shrink:0}
.iconbtn{background:none;border:none;cursor:pointer;color:inherit;opacity:.3;padding:6px;border-radius:9px;transition:.2s;display:grid;place-items:center}
.iconbtn:hover{opacity:1;background:color-mix(in srgb,var(--accent) 13%,transparent)}
.iconbtn svg{width:17px;height:17px;display:block}
.star.on{opacity:1;color:var(--c-gold)}
.star.on svg{fill:var(--c-gold);stroke:var(--c-gold)}
.arrow{flex-shrink:0;color:var(--accent);opacity:.55;transition:.3s;display:grid;place-items:center}
.card:hover .arrow{opacity:1;transform:translate(3px,-3px)}

.empty{display:none;text-align:center;padding:90px 0;opacity:.4}
.empty.show{display:block}
footer{margin-top:90px;text-align:center;font-size:13px;opacity:.4}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ===== QR MODALE ===== */
#qr{position:fixed;inset:0;z-index:90;display:none;place-items:center;background:rgba(43,39,34,.45);backdrop-filter:blur(4px);padding:24px}
#qr.show{display:grid}
.qr-card{background:#fff;border-radius:24px;padding:26px;max-width:320px;width:100%;text-align:center;box-shadow:0 30px 70px -30px rgba(0,0,0,.5)}
.qr-card h3{font-family:'Fraunces';font-weight:600;font-size:20px;margin-bottom:4px;color:#2b2722}
#qr-sub{font-size:12px;color:#999;margin-bottom:18px;word-break:break-all}
#qr-img{display:grid;place-items:center;margin-bottom:18px}
#qr-img svg{width:210px;height:210px}
.qr-close{border:none;background:#2b2722;color:#fff;border-radius:13px;padding:12px 18px;font:inherit;font-weight:600;cursor:pointer;width:100%}

@media(max-width:560px){header{padding-top:40px}.kbd-hint{display:none}}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="lockbox">
    <div class="lock-ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2b2722" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Accès privé</h2>
    <p>Entre le mot de passe pour accéder au hub.</p>
    <div class="pwd-row">
      <input id="pwd" type="password" placeholder="Mot de passe" autocomplete="off" autofocus>
      <button id="unlock">Entrer</button>
    </div>
    <div id="pwd-err">Mot de passe incorrect.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="wrap">
    <header>
      <div class="top-row">
        <span class="eyebrow">Hub personnel</span>
        <span class="status" id="status"><span class="status-dot"></span><span class="status-txt">En ligne</span></span>
      </div>
      <h1>Nicolas</h1>
      <p class="tagline">Tous mes projets GitHub Pages, réunis au même endroit.</p>
    </header>

    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Rechercher…  (touche /)" autocomplete="off">
      <span class="kbd-hint">/ ↑ ↓ ⏎</span>
      <span class="count" id="count"></span>
    </div>

    <div class="checkbar">
      <span id="lastcheck"></span>
      <button id="recheck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>Revérifier</button>
    </div>

    <main id="board"></main>
    <div class="empty" id="empty">Aucun résultat.</div>

    <footer>© 2026 Nicolas Wälchli · Tous droits réservés</footer>
  </div>
</div>

<!-- QR MODALE -->
<div id="qr">
  <div class="qr-card">
    <h3>Ouvrir sur mobile</h3>
    <div id="qr-sub"></div>
    <div id="qr-img"></div>
    <button class="qr-close">Fermer</button>
  </div>
</div>

<script>
/* ===================================================================== */
/*  ►► TES LIENS  ◄◄  — ajoute simplement des lignes { title, url }       */
/* ===================================================================== */
const DATA = [
  { name:"Nicolas",  color:"var(--c-nicolas)",  icon:"vision", links:[
    { title:"R-Vision", url:"https://nicolas9696-admin.github.io/R-vision/" },
    { title:"Taille petit enfant", url:"https://nicolas9696-admin.github.io/taille_petit_enfant/" },
  ]},
  { name:"SDISVJ",   color:"var(--c-sdisvj)",   icon:"flame", links:[
    { title:"Intervention SDISVJ", url:"https://nicolas9696-admin.github.io/Intervention_SDISVJ/" },
  ]},
  { name:"SDIS972",  color:"var(--c-sdis972)",  icon:"flame", links:[
    { title:"SDIS972", url:"https://nicolas9696-admin.github.io/SDIS972/" },
  ]},
  { name:"SEVJ",     color:"var(--c-sevj)",     icon:"bolt", links:[
    { title:"Formation OIBT", url:"https://nicolas9696-admin.github.io/SEVJ_FORMATION_OIBT/" },
    { title:"Comptoir SEVJ",  url:"https://nicolas9696-admin.github.io/SEVJ_Comptoir/" },
  ]},
  { name:"Commande", color:"var(--c-commande)", icon:"cart", links:[
    { title:"Commande sur Grati", url:"https://nicolas9696-admin.github.io/commande_sur_grati/" },
  ]},
  { name:"Configuration", color:"var(--c-config)", icon:"gear", links:[
    { title:"Tous mes GitHub", url:"https://github.com/nicolas9696-admin" },
    { title:"Apps Script",     url:"https://script.google.com/home" },
  ]},
];
/* ===================================================================== */

/* ---------- stockage navigateur (protégé) ---------- */
const store={
  get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

/* ---------- pictos ---------- */
function svg(inner){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;}
const ICONS={
  vision: svg('<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>'),
  flame:  svg('<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.4-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5Z"/>'),
  bolt:   svg('<path d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z"/>'),
  cart:   svg('<circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2 2h2l2.7 12.4a2 2 0 0 0 2 1.6h9.8a2 2 0 0 0 1.9-1.6L23 6H5"/>'),
  gear:   svg('<path d="M12.2 2h-.4a2 2 0 0 0-2 2v.2a2 2 0 0 1-1 1.7l-.4.3a2 2 0 0 1-2 0l-.2-.1a2 2 0 0 0-2.7.8l-.2.3a2 2 0 0 0 .7 2.8l.2.1a2 2 0 0 1 1 1.7v.5a2 2 0 0 1-1 1.7l-.2.1a2 2 0 0 0-.7 2.8l.2.3a2 2 0 0 0 2.7.8l.2-.1a2 2 0 0 1 2 0l.4.3a2 2 0 0 1 1 1.7V20a2 2 0 0 0 2 2h.4a2 2 0 0 0 2-2v-.2a2 2 0 0 1 1-1.7l.4-.3a2 2 0 0 1 2 0l.2.1a2 2 0 0 0 2.7-.8l.2-.3a2 2 0 0 0-.7-2.8l-.2-.1a2 2 0 0 1-1-1.7v-.5a2 2 0 0 1 1-1.7l.2-.1a2 2 0 0 0 .7-2.8l-.2-.3a2 2 0 0 0-2.7-.8l-.2.1a2 2 0 0 1-2 0l-.4-.3a2 2 0 0 1-1-1.7V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/>'),
  star:   svg('<path d="M12 2 15.1 8.3 22 9.3l-5 4.9 1.2 6.9L12 17.8 5.8 21 7 14.1 2 9.3l6.9-1L12 2Z"/>')
};
const ICN={
  arrow:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>',
  star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 15.1 8.3 22 9.3l-5 4.9 1.2 6.9L12 17.8 5.8 21 7 14.1 2 9.3l6.9-1L12 2Z"/></svg>',
  qr:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v.01M21 21v-3h-3M17 21h.01"/></svg>',
  open: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>'
};

/* ---------- refs ---------- */
const board=document.getElementById('board'), search=document.getElementById('search'),
      empty=document.getElementById('empty'), count=document.getElementById('count'),
      gate=document.getElementById('gate'), app=document.getElementById('app'),
      pwd=document.getElementById('pwd'), pwdErr=document.getElementById('pwd-err'),
      lockbox=document.querySelector('.lockbox'),
      statusEl=document.getElementById('status'), statusTxt=statusEl.querySelector('.status-txt'),
      lastEl=document.getElementById('lastcheck'), recheck=document.getElementById('recheck'),
      qrModal=document.getElementById('qr'), qrImg=document.getElementById('qr-img'), qrSub=document.getElementById('qr-sub'),
      eyebrowEl=document.querySelector('.eyebrow');

/* ---------- données dérivées ---------- */
const linkIndex={};
DATA.forEach(c=>c.links.forEach(l=>{linkIndex[l.url]={title:l.title,url:l.url,color:c.color,catName:c.name};}));
const favorites=new Set(store.get('favorites',[]));
let currentFilter="";
let kbd=[], sel=-1, eggFired=false, lastCheck=0, dragSrc=null;
const siteStatus={};
const EGG_URL="https://www.youtube.com/watch?v=s7QJG-f9EYY&list=RDs7QJG-f9EYY&start_radio=1";

/* ---------- helpers ---------- */
function initials(t){const w=t.replace(/[_-]/g,' ').split(' ').filter(Boolean);return (w.length>1?w[0][0]+w[1][0]:t.slice(0,2)).toUpperCase();}
function prettyUrl(u){return u.replace(/^https?:\/\//,'').replace(/\/$/,'');}
function sectionOf(group){return [...board.children].find(s=>s.dataset&&s.dataset.group===group);}
function getOrder(key,urls){
  const saved=store.get('order:'+key,null);
  if(!saved) return urls;
  const set=new Set(urls), out=saved.filter(u=>set.has(u));
  urls.forEach(u=>{if(!out.includes(u))out.push(u);});
  return out;
}

/* ---------- rendu ---------- */
function render(filter){
  currentFilter=filter||"";
  const f=currentFilter.trim().toLowerCase();
  board.innerHTML=""; let total=0;
  const dragOK = f==="";
  const groups=[];

  const favUrls=[...favorites].filter(u=>linkIndex[u]);
  if(favUrls.length) groups.push({key:"__fav__",name:"Favoris",color:"var(--c-gold)",icon:"star",urls:getOrder("__fav__",favUrls)});
  DATA.forEach(c=>{
    const urls=c.links.map(l=>l.url).filter(u=>!favorites.has(u));
    if(urls.length) groups.push({key:c.name,name:c.name,color:c.color,icon:c.icon,urls:getOrder(c.name,urls)});
  });

  groups.forEach(g=>{
    const urls=g.urls.filter(u=>{const l=linkIndex[u];return l&&(l.title.toLowerCase().includes(f)||u.toLowerCase().includes(f)||g.name.toLowerCase().includes(f)||l.catName.toLowerCase().includes(f));});
    if(!urls.length) return;
    total+=urls.length;
    const s=document.createElement('section');
    s.className='category'; s.dataset.group=g.key; s.style.setProperty('--accent',g.color);
    s.innerHTML=`<div class="cat-head">
        <span class="cat-badge">${ICONS[g.icon]}</span>
        <span class="cat-name">${g.name}</span>
        <div class="cat-tools">
          <span class="cat-count">${urls.length}</span>
          <button class="openall" data-group="${g.key}" title="Tout ouvrir dans des onglets">${ICN.open}<span>Tout ouvrir</span></button>
        </div>
      </div><div class="links"></div>`;
    const box=s.querySelector('.links');
    urls.forEach(u=>{
      const l=linkIndex[u], fav=favorites.has(u)?' on':'';
      const a=document.createElement('a');
      a.className='card'; a.href=u; a.target='_blank'; a.rel='noopener';
      a.dataset.url=u; a.dataset.group=g.key; a.draggable=dragOK;
      a.innerHTML=`<span class="logo">${initials(l.title)}<i class="site-dot checking" data-url="${u}"></i></span>
        <span class="meta"><div class="t">${l.title}</div><div class="u">${prettyUrl(u)}</div></span>
        <span class="actions">
          <button class="iconbtn star${fav}" data-url="${u}" title="Épingler / retirer des favoris">${ICN.star}</button>
          <button class="iconbtn qrbtn" data-url="${u}" title="Afficher le QR code">${ICN.qr}</button>
        </span>
        <span class="arrow">${ICN.arrow}</span>`;
      box.appendChild(a);
    });
    board.appendChild(s);
  });

  empty.classList.toggle('show',total===0);
  count.textContent=total+(total>1?" liens":" lien");
  paintDots();
  rebuildKbd();
  if(document.activeElement===search && kbd.length){sel=0;paintKbd();}
}

/* ---------- état des sites ---------- */
function paintDots(){
  document.querySelectorAll('.site-dot').forEach(d=>{
    const s=siteStatus[d.dataset.url]||'checking';
    d.className='site-dot '+s;
    d.title=s==='up'?'En ligne':(s==='down'?'Hors service':'Vérification…');
  });
}
function checkSite(url){
  siteStatus[url]='checking';
  const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),7000);
  fetch(url,{mode:'no-cors',cache:'no-store',signal:ctrl.signal})
    .then(()=>{siteStatus[url]='up';})
    .catch(()=>{siteStatus[url]='down';})
    .finally(()=>{clearTimeout(to);paintDots();});
}
function checkAll(){lastCheck=Date.now();updateLast();DATA.forEach(c=>c.links.forEach(l=>checkSite(l.url)));paintDots();}

/* ---------- heure de dernière vérif ---------- */
function fmtAgo(ts){
  if(!ts) return "";
  const s=Math.round((Date.now()-ts)/1000);
  if(s<8) return "vérifié à l’instant";
  if(s<60) return "vérifié il y a "+s+" s";
  const m=Math.round(s/60);
  if(m<60) return "vérifié il y a "+m+" min";
  return "vérifié il y a "+Math.round(m/60)+" h";
}
function updateLast(){lastEl.textContent=fmtAgo(lastCheck);}

/* ---------- favoris ---------- */
function toggleFav(u){
  favorites.has(u)?favorites.delete(u):favorites.add(u);
  store.set('favorites',[...favorites]);
  render(currentFilter);
}

/* ---------- tout ouvrir ---------- */
function openAll(group){
  const sec=sectionOf(group); if(!sec) return;
  [...sec.querySelectorAll('.card')].forEach((c,i)=>setTimeout(()=>window.open(c.href,'_blank','noopener'),i*150));
}

/* ---------- QR ---------- */
function showQR(url){
  try{
    const q=qrcode(0,'M'); q.addData(url); q.make();
    qrImg.innerHTML=q.createSvgTag({cellSize:6,margin:2});
  }catch(e){qrImg.innerHTML='<p style="color:#999;font-size:13px">QR indisponible</p>';}
  qrSub.textContent=prettyUrl(url);
  qrModal.classList.add('show');
}

/* ---------- navigation clavier ---------- */
function rebuildKbd(){kbd=[...board.querySelectorAll('.card')];if(sel>=kbd.length)sel=-1;paintKbd();}
function paintKbd(){kbd.forEach((c,i)=>c.classList.toggle('kbd',i===sel));}
function moveSel(d){if(!kbd.length)return;sel=(sel<0?(d>0?0:kbd.length-1):(sel+d+kbd.length)%kbd.length);paintKbd();kbd[sel].scrollIntoView({block:'nearest'});}

/* ---------- glisser-déposer ---------- */
function persistOrder(group){
  const sec=sectionOf(group); if(!sec) return;
  store.set('order:'+group,[...sec.querySelectorAll('.card')].map(c=>c.dataset.url));
}

/* ---------- statut connexion ---------- */
function refreshStatus(){
  const on=navigator.onLine;
  statusEl.classList.toggle('online',on);
  statusEl.classList.toggle('offline',!on);
  statusTxt.textContent=on?'En ligne':'Hors ligne';
}

/* ---------- gate ---------- */
const PWD_HASH="a0511267da57acab964125af8988b715a6104f3a584725ad751b44aa9b6514eb";
function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var mp=Math.pow,mw=mp(2,32),res='',words=[],bitLen=ascii.length*8;
  var hash=sha256.h=sha256.h||[],k=sha256.k=sha256.k||[],pc=k.length,comp={};
  for(var cand=2;pc<64;cand++){if(!comp[cand]){for(var i=0;i<313;i+=cand)comp[i]=cand;
    hash[pc]=(mp(cand,.5)*mw)|0;k[pc++]=(mp(cand,1/3)*mw)|0;}}
  ascii+='\x80';while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){var j=ascii.charCodeAt(i);if(j>>8)return;words[i>>2]|=j<<((3-i)%4)*8;}
  words[words.length]=((bitLen/mw)|0);words[words.length]=(bitLen);
  for(j=0;j<words.length;){var w=words.slice(j,j+=16),old=hash;hash=hash.slice(0,8);
    for(i=0;i<64;i++){var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=i<16?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]
          +(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;}
    for(i=0;i<8;i++)hash[i]=(hash[i]+old[i])|0;}
  for(i=0;i<8;i++)for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;res+=((b<16)?0:'')+b.toString(16);}
  return res;
}
function tryUnlock(){
  if(sha256(pwd.value)===PWD_HASH){
    gate.classList.add('hidden'); app.classList.add('ready');
    setTimeout(()=>{gate.style.display='none';search.focus();},500);
    checkAll(); setInterval(checkAll,60000);
  }else{
    pwdErr.classList.add('show'); lockbox.classList.add('shake');
    pwd.value=""; pwd.focus();
    setTimeout(()=>lockbox.classList.remove('shake'),400);
  }
}

/* ===================== écouteurs ===================== */
search.addEventListener('input',e=>{
  const v=e.target.value.trim().toLowerCase();
  if(v==="swiss"&&!eggFired){
    eggFired=true;
    const w=window.open(EGG_URL,"_blank"); if(!w) location.href=EGG_URL;
    e.target.value=""; render("");
    setTimeout(()=>{eggFired=false;},1200); return;
  }
  render(e.target.value);
});

board.addEventListener('click',e=>{
  const star=e.target.closest('.star');
  if(star){e.preventDefault();e.stopPropagation();toggleFav(star.dataset.url);return;}
  const q=e.target.closest('.qrbtn');
  if(q){e.preventDefault();e.stopPropagation();showQR(q.dataset.url);return;}
  const oa=e.target.closest('.openall');
  if(oa){e.preventDefault();e.stopPropagation();openAll(oa.dataset.group);return;}
});

board.addEventListener('dragstart',e=>{
  const c=e.target.closest('.card');
  if(!c||!c.draggable){return;}
  dragSrc=c; c.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',c.dataset.url);}catch(_){}
});
board.addEventListener('dragover',e=>{
  if(!dragSrc) return;
  const c=e.target.closest('.card');
  if(!c||c===dragSrc||c.dataset.group!==dragSrc.dataset.group) return;
  e.preventDefault();
  const r=c.getBoundingClientRect();
  const after=(e.clientY-r.top)/r.height>0.5;
  c.parentNode.insertBefore(dragSrc, after?c.nextSibling:c);
});
board.addEventListener('drop',e=>{e.preventDefault();});
board.addEventListener('dragend',()=>{
  if(!dragSrc) return;
  dragSrc.classList.remove('dragging');
  persistOrder(dragSrc.dataset.group);
  dragSrc=null; rebuildKbd();
});

document.addEventListener('keydown',e=>{
  if(!gate.classList.contains('hidden')) return;          // verrouillé
  const t=document.activeElement, inInput=t&&/^(input|textarea)$/i.test(t.tagName);
  if(e.key==='/'&&!inInput){e.preventDefault();search.focus();search.select();return;}
  if(e.key==='ArrowDown'){e.preventDefault();moveSel(1);return;}
  if(e.key==='ArrowUp'){e.preventDefault();moveSel(-1);return;}
  if(e.key==='Enter'){if(sel>=0&&kbd[sel]){e.preventDefault();kbd[sel].click();}return;}
  if(e.key==='Escape'){if(t===search)search.blur();sel=-1;paintKbd();qrModal.classList.remove('show');}
});

recheck.addEventListener('click',()=>{recheck.classList.add('spin');checkAll();setTimeout(()=>recheck.classList.remove('spin'),900);});
qrModal.addEventListener('click',e=>{if(e.target===qrModal||e.target.closest('.qr-close'))qrModal.classList.remove('show');});
document.getElementById('unlock').addEventListener('click',tryUnlock);
pwd.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
window.addEventListener('online',refreshStatus);
window.addEventListener('offline',refreshStatus);

/* ===================== init ===================== */
(function(){const h=new Date().getHours();
  const g=h<6?'Bonne nuit':h<12?'Bonjour':h<18?'Bon après-midi':h<22?'Bonsoir':'Bonne nuit';
  eyebrowEl.textContent=g+', Nicolas';})();
render("");
refreshStatus();
updateLast();
setInterval(updateLast,15000);
</script>

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
